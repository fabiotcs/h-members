name: CI — H-Members

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # Job 1: TypeScript check + Lint
  typecheck:
    name: TypeScript & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/api/prisma/schema.prisma
      - name: TypeScript Check (API)
        run: npx tsc --noEmit --project packages/api/tsconfig.json
      - name: TypeScript Check (Web)
        run: npx tsc --noEmit --project packages/web/tsconfig.json

  # Job 2: Next.js Build
  build-web:
    name: Build Frontend (Next.js)
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Build Next.js
        run: npm run build --workspace=packages/web
        env:
          NEXT_PUBLIC_API_URL: /api
          NEXT_PUBLIC_PLATFORM_NAME: H-Members

  # Job 3: NestJS Build
  build-api:
    name: Build Backend (NestJS)
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/api/prisma/schema.prisma
      - name: Build NestJS
        run: npm run build --workspace=packages/api

  # Job 4: Docker Build (catches Dockerfile issues, lock file sync, etc.)
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-web, build-api]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: h-members-app:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 5: Unit Tests (API)
  test-api:
    name: Tests (API)
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/api/prisma/schema.prisma
      - name: Run Tests
        run: npm test --workspace=packages/api -- --passWithNoTests
