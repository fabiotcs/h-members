name: PR Quality Gate

on:
  pull_request:
    branches: [master, main]

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/api/prisma/schema.prisma

      - name: TypeScript (API)
        run: npx tsc --noEmit --project packages/api/tsconfig.json

      - name: TypeScript (Web)
        run: npx tsc --noEmit --project packages/web/tsconfig.json

      - name: Check lock file sync
        run: |
          npm ci --dry-run 2>&1 | grep -i "missing" && echo "::error::package-lock.json is out of sync with package.json" && exit 1 || echo "Lock file in sync"

      - name: Docker build (dry run)
        run: docker build --target deps -t h-members-deps-check .
